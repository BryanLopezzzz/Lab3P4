<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Seguros Mini - Pólizas</title>
    <style>
        table {border-collapse: collapse; width: 100%}
        th, td {padding: 8px; text-align: left; border-bottom: 1px solid gray;}
        tr:hover{background-color: #f5f5f5;}
    </style>
</head>
<body>
<header>Pólizas del Cliente: <span th:text="${identificacion}"/></header>
<div class="centered">
    <table style="border:1px solid blue">
        <tr><th>Número</th><th>Placa</th><th>Descripción</th></tr>
        <tr th:each="p : ${polizas}">
            <td th:text="${p.getId()}"/>
            <td th:text="${p.getPlaca()}"/>
            <td th:text="${p.getDescripcion()}"/>
        </tr>
    </table>
</div>
<p><a href="/presentation/clientes/show">Volver a Clientes</a></p>
<footer>My Company</footer>
</body>
</html>
